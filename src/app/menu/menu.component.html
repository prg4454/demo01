<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #000;">
    <div class="container-fluid">
        <button class="navbar-toggler" type="button" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen"
            aria-controls="navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <a class="navbar-brand" href="#/">
            <strong>Demo01 App</strong>
        </a>

        <div class="collapse navbar-collapse" id="navbarNav" [class.show]="isMenuOpen">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item" *ngFor="let item of menuItems" [ngClass]="{ 'dropdown': item.subItems }">
                    <ng-container *ngIf="item.path; else submenuTemplate">
                        <a class="nav-link" [routerLink]="item.path" routerLinkActive="active" (click)="closeMenu()">
                            {{ item.label }}
                        </a>
                    </ng-container>
                    <ng-template #submenuTemplate>
                        <a class="nav-link dropdown-toggle" href="#"
                            (click)="toggleSubmenu(item); $event.preventDefault()">
                            {{ item.label }}
                        </a>
                        <ul class="submenu" [class.show]="expandedItems[item.label]">
                            <li *ngFor="let subItem of item.subItems">
                                <a class="submenu-item" [routerLink]="subItem.path" routerLinkActive="active"
                                    (click)="closeMenu(); expandedItems[item.label] = false">
                                    {{ subItem.label }}
                                </a>
                            </li>
                        </ul>
                    </ng-template>
                </li>
            </ul>
        </div>
    </div>
</nav>
