<div class="modal-header">
    <h5 class="modal-title">Unsaved Changes</h5>
</div>
<div class="modal-body">
    <p class="mb-2">You have unsaved changes. Leave without saving?</p>

    <div class="table-responsive" *ngIf="changes.length">
        <table class="table table-sm table-bordered align-middle mb-0">
            <thead>
                <tr>
                    <th>Field</th>
                    <th>Before</th>
                    <th>After</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let change of changes">
                    <td>{{ change.label }}</td>
                    <td>{{ change.before }}</td>
                    <td>{{ change.after }}</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<div class="modal-footer">
    <button class="btn btn-outline-secondary" type="button" (click)="activeModal.dismiss('keep-editing')">Keep Editing</button>
    <button class="btn btn-danger" type="button" (click)="activeModal.close('discard')">Discard Changes</button>
</div>
