<div class="container mt-3 app-grid-container">
    <div class="sticky-header">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="mb-0">Jokes Collection</h2>
            <button type="button" class="btn btn-primary" (click)="openAddModal()">+ Add Joke</button>
        </div>
        <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
            <button type="button" class="btn btn-outline-primary btn-sm" (click)="previousPage()"
                [disabled]="currentPage <= 1">&lt;&lt;</button>
            <button type="button" class="btn btn-outline-primary btn-sm" (click)="nextPage()"
                [disabled]="currentPage >= totalPages">&gt;&gt;</button>
            <div class="small text-muted">Page {{ currentPage }} of {{ totalPages }}</div>
        </div>
    </div>
</div>

<div class="container text-break">
    @for (joke of pagedJokes; track joke.id) {
    <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-6 align-items-start app-grid-row border-bottom">
        <div class="mb-1 col-12 col-lg-6">
            <b>Setup / Punchline</b>
            <button type="button" class="grid-link text-start" (click)="openEditModal(joke)">
                {{ joke.setup }}
                <div class="small text-muted mt-1">{{ joke.punchline }}</div>
            </button>
        </div>
        <div class="mb-1 col">
            <b>Category</b>
            {{ joke.category }}
        </div>
        <div class="mb-1 col">
            <b>Rating</b>
            {{ joke.rating }}/5
        </div>
        <div class="mb-1 col">
            <b>Status</b>
            <span class="status-pill" [class]="'status-pill status-' + joke.status.toLowerCase()">{{ joke.status }}</span>
        </div>
    </div>
    }
</div>
