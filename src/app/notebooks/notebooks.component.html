<div class="container mt-3 app-grid-container">
    <div class="sticky-header">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="mb-0">Notebooks Inventory</h2>
            <div class="d-flex align-items-center gap-2">
                <app-export-dropdown [rows]="notebooks" fileBaseName="export-notebooks"
                    (statusMessage)="exportMessage = $event"></app-export-dropdown>
                <button type="button" class="btn btn-primary" (click)="openAddModal()">+ Add Notebook</button>
            </div>
        </div>
        @if (exportMessage) {
        <div class="small text-muted mb-2">{{ exportMessage }}</div>
        }
        <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
            <button type="button" class="btn btn-outline-primary btn-sm" (click)="previousPage()"
                [disabled]="currentPage <= 1">&lt;&lt;</button>
            <button type="button" class="btn btn-outline-primary btn-sm" (click)="nextPage()"
                [disabled]="currentPage >= totalPages">&gt;&gt;</button>
            <div class="small text-muted">Page {{ currentPage }} of {{ totalPages }}</div>
        </div>
    </div>
</div>

<div class="container text-break">
    @for (notebook of pagedNotebooks; track notebook.id) {
    <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-6 align-items-start app-grid-row border-bottom">
        <div class="mb-1 col-12 col-md-4">
            <b>Brand</b>
            <button type="button" class="grid-link text-start" (click)="openEditModal(notebook)">
                {{ notebook.brand }}
            </button>
        </div>
        <div class="mb-1 col-12 col-md-4">
            <b>Type</b>
            {{ notebook.type }}
        </div>
        <div class="mb-1 col">
            <b>Pages</b>
            {{ notebook.pages }}
        </div>
        <div class="mb-1 col">
            <b>Size</b>
            {{ notebook.size }}
        </div>
        <div class="mb-1 col">
            <b>Color</b>
            {{ notebook.color }}
        </div>
    </div>
    }
</div>
