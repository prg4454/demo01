<div class="app-edit-modal">
    <div class="modal-header">
        <h5 class="modal-title">{{ allowDelete ? "Edit Notebook" : "Add Notebook" }}</h5>
        <button type="button" class="btn-close" aria-label="Close" (click)="activeModal.close('cancel')"></button>
    </div>

    <div class="modal-body">
        @if (editDraft) {
        <div class="row g-3 entry-grid">
            <div class="col-12 col-md-6 field-block">
                <label class="form-label">Brand</label>
                <input type="text" class="form-control" [(ngModel)]="editDraft.brand">
            </div>
            <div class="col-12 col-md-6 field-block">
                <label class="form-label">Type</label>
                <input type="text" class="form-control" [(ngModel)]="editDraft.type">
            </div>
            <div class="col-12 col-md-4 field-block">
                <label class="form-label">Pages</label>
                <input type="number" class="form-control" [(ngModel)]="editDraft.pages">
            </div>
            <div class="col-12 col-md-4 field-block">
                <label class="form-label">Size</label>
                <input type="text" class="form-control" [(ngModel)]="editDraft.size">
            </div>
            <div class="col-12 col-md-4 field-block">
                <label class="form-label">Color</label>
                <input type="text" class="form-control" [(ngModel)]="editDraft.color">
            </div>
            <div class="col-12 col-md-6 field-block">
                <label class="form-label">Status</label>
                <select class="form-select" [(ngModel)]="editDraft.status">
                    <option value="In Stock">In Stock</option>
                    <option value="Ordered">Ordered</option>
                    <option value="Discontinued">Discontinued</option>
                </select>
            </div>
            <div class="col-12 field-block">
                <label class="form-label">Notes</label>
                <textarea class="form-control" rows="2" [(ngModel)]="editDraft.notes"></textarea>
            </div>
        </div>
        }
    </div>

    <div class="modal-footer d-flex justify-content-between">
        <div>
            @if (allowDelete) {
            <button type="button" class="btn btn-danger" (click)="requestDelete()">Delete</button>
            }
        </div>
        <div class="d-flex gap-2">
            <button type="button" class="btn btn-secondary" (click)="activeModal.close('cancel')">Cancel</button>
            <button type="button" class="btn btn-primary" (click)="save()">Save</button>
        </div>
    </div>
</div>
