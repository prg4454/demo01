<div class="container mt-3 sticky-header">
    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
        <h2 class="mb-0">Cats At Vet</h2>
        <button type="button" class="btn btn-primary" (click)="openAddModal()">+ Add Cat</button>
    </div>
    <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
        <button type="button" class="btn btn-outline-primary btn-sm" (click)="previousPage()"
            [disabled]="currentPage <= 1">&lt;&lt;</button>
        <button type="button" class="btn btn-outline-primary btn-sm" (click)="nextPage()"
            [disabled]="currentPage >= totalPages">&gt;&gt;</button>
        <div class="small text-muted">Page {{ currentPage }} of {{ totalPages }}</div>
    </div>
</div>

<div class="container text-break cats-grid">
    <hr>
    @for (cat of pagedCats; track cat.id) {
    <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-6 align-items-start cat-row">
        <div class="mb-1 col">
            <b>Name</b><br>
            <button type="button" class="btn btn-link p-0 text-start text-decoration-none shadow-none cat-link"
                (click)="openEditModal(cat)">
                {{ cat.name }}
            </button>
        </div>
        <div class="mb-1 col">
            <b>Breed</b><br>
            {{ cat.breed }}
        </div>
        <div class="mb-1 col">
            <b>Owner</b><br>
            {{ cat.owner }}
        </div>
        <div class="mb-1 col">
            <b>Reason</b><br>
            {{ cat.reason }}
        </div>
        <div class="mb-1 col">
            <b>Check-In</b><br>
            {{ cat.checkIn }}
        </div>
        <div class="mb-1 col">
            <b>Status</b><br>
            <span class="status-pill" [class]="'status-pill status-' + cat.status.toLowerCase()">{{ cat.status }}</span>
        </div>
        <div class="mb-1 col">
            <b>Vet</b><br>
            {{ cat.vet }}
        </div>
    </div>
    <hr>
    }
</div>
