<div class="app-edit-modal">
    <div class="modal-header">
        <h5 class="modal-title">{{ allowDelete ? "Edit Dog" : "Add Dog" }}</h5>
        <button type="button" class="btn-close" aria-label="Close" (click)="activeModal.dismiss('cancel')"></button>
    </div>

    <div class="modal-body">
        @if (editDraft) {
        <div class="row g-3 entry-grid">
            <div class="col-12 col-md-6 field-block">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" [(ngModel)]="editDraft.name">
            </div>
            <div class="col-12 col-md-6 field-block">
                <label class="form-label">Breed</label>
                <input type="text" class="form-control" [(ngModel)]="editDraft.breed">
            </div>
            <div class="col-12 field-block">
                <label class="form-label">Reason</label>
                <textarea class="form-control" rows="2" [(ngModel)]="editDraft.reason"></textarea>
            </div>
            <div class="col-12 col-md-6 field-block">
                <label class="form-label">Vet</label>
                <input type="text" class="form-control" [(ngModel)]="editDraft.vet">
            </div>
            <div class="col-12 col-md-6 field-block">
                <label class="form-label">Status</label>
                <select class="form-select" [(ngModel)]="editDraft.status">
                    <option value="Waiting">Waiting</option>
                    <option value="Exam">Exam</option>
                    <option value="Treatment">Treatment</option>
                    <option value="Ready">Ready</option>
                </select>
            </div>
            <div class="col-12 field-block">
                <label class="form-label">Owner</label>
                <input type="text" class="form-control" [(ngModel)]="editDraft.owner">
            </div>
        </div>
        }
    </div>

    <div class="modal-footer d-flex justify-content-between">
        <div>
            @if (allowDelete) {
            <button type="button" class="btn btn-danger" (click)="requestDelete()">Delete</button>
            }
        </div>
        <div class="d-flex gap-2">
            <button type="button" class="btn btn-secondary" (click)="activeModal.dismiss('cancel')">Cancel</button>
            <button type="button" class="btn btn-primary" (click)="save()">Save</button>
        </div>
    </div>
</div>
